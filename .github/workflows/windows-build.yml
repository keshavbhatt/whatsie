name: Windows Build

on: [push, pull_request]

jobs:
  build:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          # 6.10 is the project's minimum supported Qt, so CI validates the
          # floor. (Also: released aqtinstall cannot resolve the changed
          # download-repo layout of Qt 6.11+ yet, see miurahr/aqtinstall#959.)
          version: '6.10.*'
          arch: win64_msvc2022_64
          modules: 'qtwebengine qtwebchannel qtpositioning'
          cache: true

      - name: Configure
        run: cmake -G "Visual Studio 17 2022" -A x64 -B build -DCMAKE_PREFIX_PATH="$env:QT_ROOT_DIR"

      - name: Build
        run: cmake --build build --config Release

      - name: Deploy Qt runtime
        run: '& "$env:QT_ROOT_DIR\bin\windeployqt.exe" build\Release\whatsie.exe'

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: whatsie-windows-x64
          path: build/Release
